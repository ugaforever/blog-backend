spring:
  datasource:
    url: jdbc:h2:mem:blogdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
    tcp:
      enabled: true
      port: 9092
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql
      platform: h2
      continue-on-error: false

server:
  port: 8081

h2:
  tcp:
    allow-others: true
    if-not-exists: true

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
      group:
        readiness:
          include: readinessState, customCheck
        liveness:
          include: livenessState, customCheck
  endpoints:
    web:
      exposure:
        include: "*"